<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Flight Planner — Preview</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0F1E; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #1E2D45; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    const T = {
      bg: "#0A0F1E",
      surface: "#111827",
      card: "#1A2235",
      border: "#1E2D45",
      accent: "#3B82F6",
      accentDim: "#1D4ED8",
      gold: "#F59E0B",
      green: "#10B981",
      text: "#F1F5F9",
      muted: "#64748B",
      subtle: "#94A3B8",
      danger: "#EF4444",
      font: "'Inter', 'Segoe UI', system-ui, sans-serif",
      mono: "'JetBrains Mono', 'Courier New', monospace",
    };

    const ANALYSES = [
      { id:"a", label:"Hidden City & Route Optimizer",   icon:"✈", color:"#3B82F6", desc:"Hidden city tickets, nearby airports, multi-leg combos airlines don't surface" },
      { id:"b", label:"Price Inflation Avoidance",        icon:"🛡", color:"#10B981", desc:"How airlines track searches & exact steps to avoid price inflation" },
      { id:"c", label:"Geo-Pricing Arbitrage",            icon:"🌍", color:"#8B5CF6", desc:"Same ticket priced across countries — find where it's cheapest" },
      { id:"d", label:"Optimal Booking Window",           icon:"📅", color:"#F59E0B", desc:"Best days, windows & departure periods based on historical pricing cycles" },
      { id:"e", label:"Fare Class Decoder",               icon:"🔍", color:"#EC4899", desc:"Fare rules, ticket classes & routing logic decoded to find quiet savings" },
      { id:"f", label:"Platform Price Comparison",        icon:"⚖", color:"#06B6D4", desc:"Airlines vs OTAs vs regional sites — where markups hide & where deals appear" },
      { id:"g", label:"Fare Tracking Strategy",           icon:"📡", color:"#84CC16", desc:"Monitor drops without triggering increases — timing, alerts & behavioral rules" },
    ];

    const STEPS = ["API Key","Route","Flexibility","Budget & Context","Analyses","Results"];

    const inputStyle = {
      width:"100%", background:"#0D1526", border:"1px solid #1E2D45",
      borderRadius:8, padding:"10px 14px", color:T.text, fontSize:14,
      fontFamily:T.font, boxSizing:"border-box", outline:"none",
    };
    const labelStyle = {
      display:"block", fontSize:12, fontWeight:600, color:T.muted,
      marginBottom:6, letterSpacing:0.5, textTransform:"uppercase",
    };

    function Field({ label, children }) {
      return <div style={{marginBottom:20}}><label style={labelStyle}>{label}</label>{children}</div>;
    }

    function Card({ title, subtitle, children }) {
      return (
        <div style={{background:T.surface, border:`1px solid ${T.border}`, borderRadius:14, padding:"32px 36px"}}>
          <div style={{marginBottom:28}}>
            <div style={{fontSize:20, fontWeight:700}}>{title}</div>
            {subtitle && <div style={{fontSize:13, color:T.muted, marginTop:4}}>{subtitle}</div>}
            <div style={{width:40, height:2, background:T.accent, marginTop:12, borderRadius:2}} />
          </div>
          {children}
        </div>
      );
    }

    function ToggleBtn({ active, onClick, children }) {
      return (
        <button onClick={onClick} style={{
          padding:"8px 18px", borderRadius:8,
          border:`1px solid ${active ? T.accent : T.border}`,
          background: active ? T.accent+"20" : "transparent",
          color: active ? T.accent : T.muted,
          fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:T.font,
        }}>{children}</button>
      );
    }

    function Spinner() {
      return <span style={{
        width:14, height:14, border:"2px solid currentColor",
        borderTopColor:"transparent", borderRadius:"50%",
        display:"inline-block", animation:"spin 0.7s linear infinite",
      }} />;
    }

    const navBtn = {
      padding:"12px 28px", borderRadius:10, border:"none",
      fontSize:14, fontWeight:600, fontFamily:T.font, transition:"all 0.2s",
    };
    const ghostBtn = {
      padding:"7px 16px", borderRadius:8, border:`1px solid ${T.border}`,
      background:"transparent", color:T.muted, fontSize:12,
      fontWeight:600, cursor:"pointer", fontFamily:T.font,
    };

    // ── DEMO result text ──────────────────────────────────────────────────────
    const DEMO_RESULTS = {
      a: `ROUTE ANALYSIS: Mumbai (BOM) → London (LHR)

━━━ HIDDEN CITY OPPORTUNITIES ━━━
Found 2 viable hidden city routes:

  1. BOM → LHR via FRA (Frankfurt)
     Book: BOM → FRA → [LHR] → final_dest
     Estimated saving: $180–$240 vs direct
     ⚠ Risk: Must use carry-on only. Cannot check bags.

  2. BOM → LHR via AMS (Amsterdam)
     Book: BOM → AMS → [LHR] → EDI
     Estimated saving: $120–$160 vs direct
     ⚠ Risk: Airline may cancel onward segment.

━━━ NEARBY AIRPORTS ━━━
Departure alternatives:
  • Pune (PNQ) — 150km from Mumbai
    Typical saving: $40–$90 if Air India operates
  • Ahmedabad (AMD) — 530km, usually not viable

Arrival alternatives:
  • London Gatwick (LGW) — 45km from LHR
    Saving: $60–$180 | Extra cost to central: ~$35
  • London Stansted (STN) — 65km
    Saving: $80–$220 | Budget carriers only

━━━ MULTI-LEG COMBINATIONS ━━━
Ranked cheapest legal options:
  #1  BOM→DXB (FlyDubai) + DXB→LHR (Emirates)
      ~$640 total | Book separately | ±2hr connection
  #2  BOM→LHR direct (Air India)
      ~$720 | Most reliable option
  #3  BOM→DOH (IndiGo) + DOH→LHR (Qatar)
      ~$680 | Excellent service | 6hr layover`,

      b: `PRICE INFLATION TRIGGERS & AVOIDANCE

━━━ HOW AIRLINES INFLATE PRICES ━━━

1. COOKIE TRACKING
   Mechanism: OTAs store session cookies linking your identity
   to specific route searches. Repeated searches signal high
   intent → inventory is artificially "reduced" to trigger FOMO.
   Trigger threshold: ~3 searches on same device/browser.

2. BROWSER FINGERPRINTING
   Canvas, WebGL, font enumeration, screen resolution, timezone
   — all combined into a unique ID. Persists even after clearing
   cookies. Used by Kayak, Expedia, and most major OTAs.

3. IP-BASED DEMAND SIGNALS
   Your ISP location is mapped to demand data. Searches from
   high-income zip codes see prices 8–15% higher on average.

4. DEVICE TYPE
   Mobile users see prices ~6% higher than desktop on average
   (tested across Booking.com, Expedia, Priceline — 2024 data).

5. ACCOUNT LOGIN
   Logged-in users get "personalized" (inflated) prices based
   on purchase history and perceived willingness to pay.

━━━ STEP-BY-STEP SEARCH METHOD ━━━
Step 1: Use a fresh private/incognito window
Step 2: Enable a VPN — select a server in a Tier-2 city
         (avoid major US/UK cities — use Poland, Czech Republic)
Step 3: Do NOT log into any OTA account
Step 4: Search on Google Flights first (least aggressive tracking)
Step 5: Note prices, close window completely
Step 6: Wait 2–4 hours before next search session
Step 7: Use a different browser for each platform comparison`,
    };

    function buildPrompt(analysisId, inputs) {
      // Same prompts as main file — abbreviated here for preview
      return `[Prompt for analysis ${analysisId.toUpperCase()} would be sent to Claude API with all ${Object.keys(inputs).length} user inputs injected]`;
    }

    // ── Main App ──────────────────────────────────────────────────────────────
    function FlightPlanner() {
      const [step, setStep] = useState(0);
      const [apiKey, setApiKey] = useState("");
      const [demoMode, setDemoMode] = useState(false);
      const [inputs, setInputs] = useState({
        origin:"", destination:"", tripType:"roundtrip", dates:"",
        travelers:"1 adult", dateFlexibility:"", timePrefs:"",
        maxStops:"", maxLayover:"", airlinePrefs:"", baggage:"",
        budget:"", currency:"USD", userCountry:"", prevSearches:"", miles:"",
      });
      const [selectedAnalyses, setSelectedAnalyses] = useState(ANALYSES.map(a=>a.id));
      const [results, setResults] = useState({});
      const [loading, setLoading] = useState({});
      const [activeResult, setActiveResult] = useState(null);
      const [error, setError] = useState("");
      const abortRefs = useRef({});

      const set = key => e => setInputs(prev => ({...prev, [key]: e.target.value}));

      function canProceed() {
        if (step===0) return demoMode || apiKey.trim().length > 10;
        if (step===1) return inputs.origin.trim() && inputs.destination.trim() && inputs.dates.trim();
        if (step===4) return selectedAnalyses.length > 0;
        return true;
      }

      // Demo mode: stream fake results
      async function streamDemo(analysisId) {
        const text = DEMO_RESULTS[analysisId] ||
          `[A] ANALYSIS ${analysisId.toUpperCase()}: ${ANALYSES.find(x=>x.id===analysisId)?.label}\n\nThis analysis would query Claude with your full route, dates, budget, and preferences to produce a detailed, actionable breakdown.\n\nIn live mode (with API key), Claude streams the full response here in real time.\n\nSample insight: For ${inputs.origin||"BOM"} → ${inputs.destination||"LHR"} on ${inputs.dates||"your dates"}, historical data shows Tuesdays and Wednesdays offer 12–18% lower fares compared to Friday and Sunday departures. The 6–8 week booking window historically shows the best price-to-availability ratio for this route corridor.`;
        setResults(r => ({...r, [analysisId]:""}));
        setLoading(l => ({...l, [analysisId]:true}));
        setActiveResult(analysisId);
        for (let i=0; i<text.length; i+=3) {
          await new Promise(r=>setTimeout(r, 12));
          setResults(r => ({...r, [analysisId]: text.slice(0, i+3)}));
        }
        setResults(r => ({...r, [analysisId]: text}));
        setLoading(l => ({...l, [analysisId]:false}));
      }

      async function runAnalysis(analysisId) {
        if (demoMode) { await streamDemo(analysisId); return; }
        if (!apiKey.trim()) { setError("API key required."); return; }

        const prompt = buildPrompt(analysisId, inputs);
        setLoading(l => ({...l, [analysisId]:true}));
        setResults(r => ({...r, [analysisId]:""}));
        setActiveResult(analysisId);

        const controller = new AbortController();
        abortRefs.current[analysisId] = controller;

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST", signal:controller.signal,
            headers:{
              "x-api-key": apiKey.trim(),
              "anthropic-version":"2023-06-01",
              "content-type":"application/json",
              "anthropic-dangerous-direct-browser-calls":"true",
            },
            body: JSON.stringify({
              model:"claude-opus-4-6", max_tokens:2048, stream:true,
              messages:[{role:"user", content:prompt}],
            }),
          });
          if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||`API error ${res.status}`); }
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          while (true) {
            const {done, value} = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, {stream:true});
            const lines = buffer.split("\n");
            buffer = lines.pop();
            for (const line of lines) {
              if (line.startsWith("data: ")) {
                const data = line.slice(6).trim();
                if (data==="[DONE]") continue;
                try {
                  const json=JSON.parse(data);
                  const delta=json.delta?.text||"";
                  if (delta) setResults(r=>({...r,[analysisId]:(r[analysisId]||"")+delta}));
                } catch {}
              }
            }
          }
        } catch(e) {
          if (e.name!=="AbortError") setResults(r=>({...r,[analysisId]:`Error: ${e.message}`}));
        } finally {
          setLoading(l=>({...l,[analysisId]:false}));
        }
      }

      async function runAll() {
        setStep(5); setResults({}); setError("");
        for (const id of selectedAnalyses) await runAnalysis(id);
      }

      return (
        <div style={{minHeight:"100vh", background:T.bg, fontFamily:T.font, color:T.text}}>

          {/* Header */}
          <div style={{
            borderBottom:`1px solid ${T.border}`, padding:"20px 32px",
            display:"flex", alignItems:"center", justifyContent:"space-between",
            background:T.surface,
          }}>
            <div>
              <div style={{fontSize:20, fontWeight:700, letterSpacing:-0.5}}>✈ AI Flight Planner</div>
              <div style={{fontSize:12, color:T.muted, marginTop:2}}>7-lens fare intelligence engine</div>
            </div>
            <div style={{display:"flex", gap:8, alignItems:"center", flexWrap:"wrap"}}>
              {STEPS.map((s,i) => (
                <div key={i} style={{display:"flex", alignItems:"center", gap:8}}>
                  <div
                    title={s}
                    onClick={() => i<step && setStep(i)}
                    style={{
                      width:28, height:28, borderRadius:"50%",
                      background: i===step ? T.accent : i<step ? T.green : T.border,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:11, fontWeight:700, cursor:i<step?"pointer":"default",
                      transition:"all 0.2s",
                    }}>
                    {i<step ? "✓" : i+1}
                  </div>
                  {i<STEPS.length-1 && <div style={{width:20, height:1, background:i<step?T.green:T.border}} />}
                </div>
              ))}
            </div>
          </div>

          <div style={{maxWidth:860, margin:"0 auto", padding:"40px 24px"}}>

            {/* ── STEP 0: API Key ── */}
            {step===0 && (
              <Card title="Get Started" subtitle="Enter your Anthropic API key for live analysis, or use Demo Mode to preview the UI.">
                {/* Demo mode banner */}
                <div style={{
                  marginBottom:24, padding:"16px 20px", borderRadius:10,
                  background: demoMode ? T.green+"15" : T.gold+"15",
                  border:`1px solid ${demoMode ? T.green+"50" : T.gold+"50"}`,
                  display:"flex", alignItems:"center", justifyContent:"space-between",
                }}>
                  <div>
                    <div style={{fontWeight:700, color:demoMode?T.green:T.gold, fontSize:14}}>
                      {demoMode ? "✓ Demo Mode Active" : "Try Demo Mode"}
                    </div>
                    <div style={{fontSize:12, color:T.muted, marginTop:2}}>
                      {demoMode
                        ? "Simulated Claude responses will stream in the Results step."
                        : "See the full app flow with simulated AI responses — no API key needed."}
                    </div>
                  </div>
                  <button
                    onClick={() => setDemoMode(d=>!d)}
                    style={{
                      padding:"8px 18px", borderRadius:8, border:"none", cursor:"pointer",
                      background: demoMode ? T.green : T.gold,
                      color:"#000", fontWeight:700, fontSize:13, fontFamily:T.font,
                    }}>
                    {demoMode ? "Enabled" : "Enable"}
                  </button>
                </div>

                <div style={{display:"flex", alignItems:"center", gap:16, marginBottom:20}}>
                  <div style={{flex:1, height:1, background:T.border}} />
                  <span style={{fontSize:12, color:T.muted}}>OR USE API KEY</span>
                  <div style={{flex:1, height:1, background:T.border}} />
                </div>

                <Field label="Anthropic API Key">
                  <input
                    type="password" placeholder="sk-ant-..."
                    value={apiKey} onChange={e=>setApiKey(e.target.value)}
                    style={{...inputStyle, opacity:demoMode?0.4:1}}
                    disabled={demoMode}
                  />
                </Field>
                <div style={{fontSize:12, color:T.muted, marginTop:-12}}>
                  Get yours at console.anthropic.com · Used only in your browser session, never stored
                </div>
              </Card>
            )}

            {/* ── STEP 1: Route ── */}
            {step===1 && (
              <Card title="Route & Travel Basics" subtitle="Tell us where you're going and when.">
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:16}}>
                  <Field label="Origin City / Airport *">
                    <input style={inputStyle} placeholder="e.g. Mumbai (BOM) or New York" value={inputs.origin} onChange={set("origin")} />
                  </Field>
                  <Field label="Destination City / Airport *">
                    <input style={inputStyle} placeholder="e.g. London (LHR) or Bangkok" value={inputs.destination} onChange={set("destination")} />
                  </Field>
                </div>
                <Field label="Trip Type">
                  <div style={{display:"flex", gap:10}}>
                    {[["roundtrip","Round Trip"],["oneway","One Way"],["openjaw","Open Jaw"]].map(([val,lbl])=>(
                      <ToggleBtn key={val} active={inputs.tripType===val} onClick={()=>setInputs(p=>({...p,tripType:val}))}>{lbl}</ToggleBtn>
                    ))}
                  </div>
                </Field>
                <Field label="Travel Dates / Date Range *">
                  <input style={inputStyle} placeholder="e.g. Apr 15–22, 2025 or late April 2025" value={inputs.dates} onChange={set("dates")} />
                </Field>
                <Field label="Number of Travelers">
                  <input style={inputStyle} placeholder="e.g. 2 adults, 1 child (age 8)" value={inputs.travelers} onChange={set("travelers")} />
                </Field>
              </Card>
            )}

            {/* ── STEP 2: Flexibility ── */}
            {step===2 && (
              <Card title="Flexibility & Constraints" subtitle="More flexibility = more savings we can find.">
                <Field label="Date Flexibility">
                  <input style={inputStyle} placeholder="e.g. ±3 days, any day in April, or fixed" value={inputs.dateFlexibility} onChange={set("dateFlexibility")} />
                </Field>
                <Field label="Departure / Arrival Time Preferences">
                  <input style={inputStyle} placeholder="e.g. no red-eyes, morning only, flexible" value={inputs.timePrefs} onChange={set("timePrefs")} />
                </Field>
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:16}}>
                  <Field label="Max Number of Stops">
                    <input style={inputStyle} placeholder="e.g. 1, 2, or non-stop only" value={inputs.maxStops} onChange={set("maxStops")} />
                  </Field>
                  <Field label="Max Layover Duration">
                    <input style={inputStyle} placeholder="e.g. 4 hours, overnight OK, any" value={inputs.maxLayover} onChange={set("maxLayover")} />
                  </Field>
                </div>
                <Field label="Airline Preferences / Restrictions">
                  <input style={inputStyle} placeholder="e.g. prefer Star Alliance, avoid Spirit, any" value={inputs.airlinePrefs} onChange={set("airlinePrefs")} />
                </Field>
                <Field label="Checked Baggage Needs">
                  <input style={inputStyle} placeholder="e.g. 1 checked bag 23kg, carry-on only" value={inputs.baggage} onChange={set("baggage")} />
                </Field>
              </Card>
            )}

            {/* ── STEP 3: Budget & Context ── */}
            {step===3 && (
              <Card title="Budget & Booking Context" subtitle="Helps us calibrate geo-pricing and platform comparisons.">
                <div style={{display:"grid", gridTemplateColumns:"2fr 1fr", gap:16}}>
                  <Field label="Target Budget or Best Price Seen">
                    <input style={inputStyle} placeholder="e.g. $800, ₹65,000, or unsure" value={inputs.budget} onChange={set("budget")} />
                  </Field>
                  <Field label="Currency">
                    <input style={inputStyle} placeholder="USD, EUR, INR…" value={inputs.currency} onChange={set("currency")} />
                  </Field>
                </div>
                <Field label="Your Current Country / Location">
                  <input style={inputStyle} placeholder="e.g. India, United States, Germany" value={inputs.userCountry} onChange={set("userCountry")} />
                </Field>
                <Field label="Platforms Already Searched (and when)">
                  <input style={inputStyle} placeholder="e.g. Google Flights 3 days ago, Kayak yesterday" value={inputs.prevSearches} onChange={set("prevSearches")} />
                </Field>
                <Field label="Travel Credit Cards / Airline Miles / Loyalty Programs">
                  <input style={inputStyle} placeholder="e.g. Chase Sapphire, 40k United miles, none" value={inputs.miles} onChange={set("miles")} />
                </Field>
              </Card>
            )}

            {/* ── STEP 4: Analysis Selection ── */}
            {step===4 && (
              <Card title="Choose Your Analyses" subtitle="Select which of the 7 lenses to run. All are selected by default.">
                <div style={{display:"flex", gap:10, marginBottom:20}}>
                  <button style={ghostBtn} onClick={()=>setSelectedAnalyses(ANALYSES.map(a=>a.id))}>Select All</button>
                  <button style={ghostBtn} onClick={()=>setSelectedAnalyses([])}>Clear All</button>
                </div>
                <div style={{display:"flex", flexDirection:"column", gap:10}}>
                  {ANALYSES.map(a => {
                    const sel = selectedAnalyses.includes(a.id);
                    return (
                      <div key={a.id} onClick={()=>setSelectedAnalyses(prev=>sel?prev.filter(x=>x!==a.id):[...prev,a.id])}
                        style={{
                          display:"flex", alignItems:"center", gap:16,
                          padding:"14px 18px", borderRadius:10, cursor:"pointer",
                          border:`1px solid ${sel ? a.color+"60" : T.border}`,
                          background: sel ? a.color+"12" : T.card,
                          transition:"all 0.2s",
                        }}>
                        <div style={{
                          width:36, height:36, borderRadius:8, flexShrink:0,
                          background: sel ? a.color+"30" : T.border+"60",
                          display:"flex", alignItems:"center", justifyContent:"center",
                          fontSize:16, color: sel ? a.color : T.muted,
                        }}>{a.icon}</div>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:600, fontSize:14, color:sel?T.text:T.subtle}}>
                            <span style={{color:sel?a.color:T.muted, marginRight:8, fontFamily:T.mono, fontSize:12}}>[{a.id.toUpperCase()}]</span>
                            {a.label}
                          </div>
                          <div style={{fontSize:12, color:T.muted, marginTop:2}}>{a.desc}</div>
                        </div>
                        <div style={{
                          width:20, height:20, borderRadius:4, flexShrink:0,
                          border:`2px solid ${sel?a.color:T.border}`,
                          background:sel?a.color:"transparent",
                          display:"flex", alignItems:"center", justifyContent:"center",
                          fontSize:12, color:"#fff",
                        }}>{sel?"✓":""}</div>
                      </div>
                    );
                  })}
                </div>
              </Card>
            )}

            {/* ── STEP 5: Results ── */}
            {step===5 && (
              <div>
                <div style={{marginBottom:24}}>
                  <div style={{fontSize:22, fontWeight:700}}>Analysis Results</div>
                  <div style={{fontSize:14, color:T.muted, marginTop:4}}>
                    {inputs.origin||"Origin"} → {inputs.destination||"Destination"} · {inputs.dates||"your dates"}
                    {demoMode && <span style={{marginLeft:12, padding:"2px 8px", background:T.gold+"20", color:T.gold, borderRadius:4, fontSize:11, fontWeight:700}}>DEMO</span>}
                  </div>
                </div>

                {/* Tab bar */}
                <div style={{
                  display:"flex", gap:6, flexWrap:"wrap", marginBottom:24,
                  padding:12, background:T.surface, borderRadius:12,
                  border:`1px solid ${T.border}`,
                }}>
                  {ANALYSES.filter(a=>selectedAnalyses.includes(a.id)).map(a => {
                    const isActive = activeResult===a.id;
                    const isLoading = loading[a.id];
                    const isDone = results[a.id] && !isLoading;
                    return (
                      <button key={a.id} onClick={()=>setActiveResult(a.id)} style={{
                        padding:"8px 14px", borderRadius:8, border:"none", cursor:"pointer",
                        background: isActive ? a.color : "transparent",
                        color: isActive ? "#fff" : isDone ? a.color : T.muted,
                        fontSize:13, fontWeight:600, fontFamily:T.font,
                        display:"flex", alignItems:"center", gap:6,
                        transition:"all 0.2s",
                      }}>
                        {isLoading ? <Spinner /> : a.icon}
                        <span>[{a.id.toUpperCase()}]</span>
                      </button>
                    );
                  })}
                </div>

                {activeResult && (() => {
                  const a = ANALYSES.find(x=>x.id===activeResult);
                  const text = results[activeResult]||"";
                  const isLoading = loading[activeResult];
                  return (
                    <div style={{background:T.surface, border:`1px solid ${a.color}30`, borderRadius:12, overflow:"hidden"}}>
                      <div style={{
                        padding:"16px 24px", borderBottom:`1px solid ${T.border}`,
                        display:"flex", alignItems:"center", gap:12,
                        background:a.color+"12",
                      }}>
                        <span style={{fontSize:20}}>{a.icon}</span>
                        <div>
                          <div style={{fontWeight:700, color:a.color}}>{a.label}</div>
                          <div style={{fontSize:12, color:T.muted}}>{a.desc}</div>
                        </div>
                        {isLoading && <div style={{marginLeft:"auto", display:"flex", alignItems:"center", gap:8, color:T.muted, fontSize:12}}>
                          <Spinner /> Analyzing…
                        </div>}
                        {isDone && <div style={{marginLeft:"auto", padding:"3px 10px", background:T.green+"20", color:T.green, borderRadius:6, fontSize:11, fontWeight:700}}>DONE</div>}
                      </div>
                      <div style={{
                        padding:24, fontFamily:T.mono, fontSize:13.5,
                        lineHeight:1.85, color:T.text, whiteSpace:"pre-wrap",
                        maxHeight:520, overflowY:"auto", minHeight:200,
                      }}>
                        {text || (isLoading ? "" : <span style={{color:T.muted}}>Waiting to start…</span>)}
                        {isLoading && <span style={{opacity:0.5}}>▋</span>}
                      </div>
                    </div>
                  );
                })()}

                {!activeResult && (
                  <div style={{
                    textAlign:"center", padding:"60px 20px", color:T.muted,
                    background:T.surface, borderRadius:12, border:`1px solid ${T.border}`,
                  }}>
                    Select an analysis tab above to view results.
                  </div>
                )}
              </div>
            )}

            {/* Error */}
            {error && (
              <div style={{marginTop:16, padding:"12px 16px", background:T.danger+"20", border:`1px solid ${T.danger}`, borderRadius:8, color:T.danger, fontSize:13}}>
                {error}
              </div>
            )}

            {/* Navigation */}
            <div style={{display:"flex", justifyContent:"space-between", marginTop:32}}>
              <button
                onClick={()=>{ setStep(s=>Math.max(0,s-1)); setError(""); }}
                disabled={step===0}
                style={{...navBtn, background:"transparent", color:step===0?T.muted:T.subtle, border:`1px solid ${step===0?T.border:T.muted}`, cursor:step===0?"not-allowed":"pointer"}}>
                ← Back
              </button>
              {step<4 && (
                <button onClick={()=>{ setError(""); setStep(s=>s+1); }} disabled={!canProceed()} style={{...navBtn, background:canProceed()?T.accent:T.border, color:canProceed()?"#fff":T.muted, cursor:canProceed()?"pointer":"not-allowed"}}>
                  Continue →
                </button>
              )}
              {step===4 && (
                <button onClick={runAll} disabled={!canProceed()} style={{...navBtn, background:canProceed()?T.gold:T.border, color:canProceed()?"#000":T.muted, fontWeight:700, cursor:canProceed()?"pointer":"not-allowed"}}>
                  Run {selectedAnalyses.length} Analyses →
                </button>
              )}
              {step===5 && (
                <button onClick={()=>{ setStep(1); setResults({}); setActiveResult(null); }} style={{...navBtn, background:T.accentDim, color:"#fff", cursor:"pointer"}}>
                  New Search
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<FlightPlanner />);
  </script>
</body>
</html>
